name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to create Releases on tag pushes

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: vers
        run: |
          PROJECT_MV=$(xcodebuild -project pagerduty-menubar.xcodeproj -scheme pagerduty-menubar -showBuildSettings -configuration Release \
            | awk '/^[[:space:]]*MARKETING_VERSION/ {print $3; exit}')
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VER="${GITHUB_REF#refs/tags/v}"
            if [[ "$TAG_VER" != "$PROJECT_MV" ]]; then
              echo "::error::tag v$TAG_VER does not match project MARKETING_VERSION $PROJECT_MV. Did you forget to run bin/release?"
              exit 1
            fi
            VERSION="$TAG_VER"
          else
            VERSION="${PROJECT_MV}+$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Run tests
        run: |
          xcodebuild \
            -project pagerduty-menubar.xcodeproj \
            -scheme pagerduty-menubar \
            -testPlan Tests \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Build
        run: |
          xcodebuild \
            -project pagerduty-menubar.xcodeproj \
            -scheme pagerduty-menubar \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .app
        id: pkg
        run: |
          cd build/Build/Products/Release
          ZIP="pagerduty-menubar-${{ steps.vers.outputs.version }}.zip"
          ditto -c -k --sequesterRsrc --keepParent pagerduty-menubar.app "$ZIP"
          echo "zip=build/Build/Products/Release/$ZIP" >> "$GITHUB_OUTPUT"
          ls -lh "$ZIP"

      - uses: actions/upload-artifact@v4
        with:
          name: pagerduty-menubar-${{ steps.vers.outputs.version }}
          path: ${{ steps.pkg.outputs.zip }}
          retention-days: 14

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.zip }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.vers.outputs.version, '-') }}


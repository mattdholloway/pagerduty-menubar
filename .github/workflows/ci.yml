name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to create Releases on tag pushes

jobs:
  test:
    name: test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          xcodebuild \
            -project pagerduty-menubar.xcodeproj \
            -scheme pagerduty-menubar \
            -testPlan Tests \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            test

  release:
    name: release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: vers
        run: |
          PROJECT_MV=$(xcodebuild -project pagerduty-menubar.xcodeproj -scheme pagerduty-menubar -showBuildSettings -configuration Release \
            | awk '/^[[:space:]]*MARKETING_VERSION/ {print $3; exit}')
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG_VER" != "$PROJECT_MV" ]]; then
            echo "::error::tag v$TAG_VER does not match project MARKETING_VERSION $PROJECT_MV. Did you forget to run bin/release?"
            exit 1
          fi
          echo "version=$TAG_VER" >> "$GITHUB_OUTPUT"
          echo "Building version $TAG_VER"

      - name: Build
        run: |
          xcodebuild \
            -project pagerduty-menubar.xcodeproj \
            -scheme pagerduty-menubar \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .app
        id: pkg
        run: |
          cd build/Build/Products/Release
          ZIP="pagerduty-menubar-${{ steps.vers.outputs.version }}.zip"
          ditto -c -k --sequesterRsrc --keepParent pagerduty-menubar.app "$ZIP"
          echo "zip=build/Build/Products/Release/$ZIP" >> "$GITHUB_OUTPUT"
          ls -lh "$ZIP"

      - name: Build DMG
        id: dmg
        run: |
          DMG="pagerduty-menubar-${{ steps.vers.outputs.version }}.dmg"
          bin/make-dmg build/Build/Products/Release/pagerduty-menubar.app "$DMG" "pagerduty-menubar ${{ steps.vers.outputs.version }}"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.zip }}
            ${{ steps.dmg.outputs.dmg }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.vers.outputs.version, '-') }}



name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to create Releases on tag pushes

jobs:
  test:
    name: test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect code changes
        id: changes
        # On push, diff against the previous commit. On PRs, GitHub already
        # provides github.event.before / pull_request.base.sha; the simplest
        # portable shell uses `git diff --name-only HEAD^ HEAD` for pushes
        # and the PR base for pull_request events.
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD || true)
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            # First push on a branch has 0000... as before; handle that.
            BEFORE="${{ github.event.before }}"
            if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              CHANGED=$(git ls-tree -r --name-only HEAD)
            else
              CHANGED=$(git diff --name-only "$BEFORE" HEAD || git ls-tree -r --name-only HEAD)
            fi
          else
            # workflow_dispatch / tag pushes: always run.
            CHANGED="FORCE"
          fi
          echo "Changed files:"
          echo "$CHANGED"
          # Anything outside docs / GitHub metadata triggers a real test run.
          # Always run if the workflow file itself changed (so CI tweaks
          # actually get exercised).
          if echo "$CHANGED" | grep -Ev '^(README\.md|LICENSE|\.gitignore|\.copilot/|docs/|\.github/ISSUE_TEMPLATE/|\.github/PULL_REQUEST_TEMPLATE)' | grep -q .; then
            echo "needs_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.changes.outputs.needs_tests == 'true'
        run: |
          xcodebuild \
            -project pagerduty-menubar.xcodeproj \
            -scheme pagerduty-menubar \
            -testPlan Tests \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Skip notice
        if: steps.changes.outputs.needs_tests != 'true'
        run: echo "::notice::Only docs / metadata changed — skipped xcodebuild test."

  release:
    name: release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: vers
        run: |
          PROJECT_MV=$(xcodebuild -project pagerduty-menubar.xcodeproj -scheme pagerduty-menubar -showBuildSettings -configuration Release \
            | awk '/^[[:space:]]*MARKETING_VERSION/ {print $3; exit}')
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG_VER" != "$PROJECT_MV" ]]; then
            echo "::error::tag v$TAG_VER does not match project MARKETING_VERSION $PROJECT_MV. Did you forget to run bin/release?"
            exit 1
          fi
          echo "version=$TAG_VER" >> "$GITHUB_OUTPUT"
          echo "Building version $TAG_VER"

      - name: Build
        run: |
          xcodebuild \
            -project pagerduty-menubar.xcodeproj \
            -scheme pagerduty-menubar \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .app
        id: pkg
        run: |
          cd build/Build/Products/Release
          ZIP="pagerduty-menubar-${{ steps.vers.outputs.version }}.zip"
          ditto -c -k --sequesterRsrc --keepParent pagerduty-menubar.app "$ZIP"
          echo "zip=build/Build/Products/Release/$ZIP" >> "$GITHUB_OUTPUT"
          ls -lh "$ZIP"

      - name: Build DMG
        id: dmg
        run: |
          DMG="pagerduty-menubar-${{ steps.vers.outputs.version }}.dmg"
          bin/make-dmg build/Build/Products/Release/pagerduty-menubar.app "$DMG" "pagerduty-menubar ${{ steps.vers.outputs.version }}"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.zip }}
            ${{ steps.dmg.outputs.dmg }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.vers.outputs.version, '-') }}


